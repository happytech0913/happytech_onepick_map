/* 등급: 활동 점수가 기준을 넘으면 자동 업그레이드 (기준은 관리자 설정에서 조정) */
const LEVELS = [
  { lv: 1, icon: "🌱", name: "Lv.1" },
  { lv: 2, icon: "🌿", name: "Lv.2" },
  { lv: 3, icon: "🌳", name: "Lv.3" },
  { lv: 4, icon: "⭐", name: "Lv.4" },
  { lv: 5, icon: "👑", name: "Lv.5" },
];

/* 자동 등급 기준 — App 렌더 시 settings 값으로 갱신됨 */
let LEVEL_PTS = [DEFAULT_SETTINGS.lv2Pts, DEFAULT_SETTINGS.lv3Pts, DEFAULT_SETTINGS.lv4Pts, DEFAULT_SETTINGS.lv5Pts];
const autoLevelOf = (m) => {
  const gs = growthScore(m);
  let lv = 1;
  if (gs >= LEVEL_PTS[0]) lv = 2;
  if (gs >= LEVEL_PTS[1]) lv = 3;
  if (gs >= LEVEL_PTS[2]) lv = 4;
  if (gs >= LEVEL_PTS[3]) lv = 5;
  return lv;
};
/* 하이브리드 등급: 수동 지정(1~5)이 있으면 그대로 · 자동 모드(0)면 활동 점수로 계산 */
const manualLevelOf = (m) => Math.min(Math.max(Number(m && m.level) || 0, 0), 5); // 0 = 자동
const effLevelNum = (m) => {
  const manual = manualLevelOf(m);
  return manual >= 1 ? manual : autoLevelOf(m);
};
const levelOf = (m) => LEVELS[effLevelNum(m) - 1];
const canUse = (c, S) => c >= S.minUse;

  { k: "parts", label: "이벤트 참가", short: "참가", icon: "✋", pts: 0.1 },

const growthScore = (m) =>
  (m.auctions || 0) * 5 + (m.bids || 0) * 1 + (m.visits || 0) * 0.5 + (m.wins || 0) * 0.2 + (m.parts || 0) * 0.1;

  const w = Math.ceil(d.getDate() / 7);

};

/* 시트에서 Date 객체로 넘어온 날짜를 MM-DD로 정리 */
const shortDate = (s) => {
  const str = String(s || "");
  if (/^\d{2}-\d{2}$/.test(str)) return str;
  const d = new Date(str);
  if (!isNaN(d.getTime())) return `${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  return str.slice(0, 10);
};

   Apps Script 웹 앱 배포 후 발급된 URL을 아래에 붙여넣으세요.
   비워두면 데모 모드(새로고침 시 초기화)로 작동합니다.

const CONFIG = {
  API_URL: "https://script.google.com/macros/s/AKfycbz_TQCrc0dxcaKSS9LCCB84C22Kzt2qYgwRRMSJxYLzmAw3oHWZIdtDA9t8owkCch2s/exec",
};
const LIVE = () => !!CONFIG.API_URL;

async function api(action, payload = {}) {
  const res = await fetch(CONFIG.API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action, ...payload }),
  });
  const j = await res.json();
  if (!j.ok) throw new Error(j.error || "요청에 실패했어요");
  return j.data;
}

/* ── 리더보드 (관리자용) ── */
function Leaderboard({ members, settings }) {
  const ranked = [...members].sort((a, b) => b.credits - a.credits);
  const top3 = ranked.slice(0, 3);
  const rest = ranked.slice(3);
  const medal = ["🥇", "🥈", "🥉"];
  const max = ranked[0]?.credits || 1;

  return (
    <div>
      <SectionTitle eyebrow={periodLabel()} title="그로인 크레딧 리더보드" right={<Pill tone="line">매주 월요일 단톡방 공유</Pill>} />
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(180px,1fr))", gap: 12, marginBottom: 16 }}>
        {top3.map((m, i) => (
          <Card key={m.id} pad={18} style={{ position: "relative", overflow: "hidden",
            border: i === 0 ? "1.5px solid transparent" : `1px solid ${T.line}`,
            background: i === 0 ? `linear-gradient(#fff,#fff) padding-box, ${T.grad} border-box` : T.card }}>
            <div style={{ position: "absolute", top: -18, right: -8, fontSize: 64, opacity: 0.12 }}>{levelOf(m).icon}</div>
            <div style={{ fontSize: 24 }}>{medal[i]}</div>
            <div style={{ fontWeight: 800, fontSize: 16.5, letterSpacing: "-0.02em", marginTop: 4 }}>{m.name}</div>
            <div style={{ color: T.sub, fontSize: 12.5, marginTop: 2 }}>{levelOf(m).icon} {levelOf(m).name} · 참가 {m.parts}회 · 우승 {m.wins}회</div>
            <div style={{ marginTop: 10, display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
              <Pill>{m.credits.toLocaleString()} 크레딧</Pill>
              <UseBadge credits={m.credits} settings={settings} />
            </div>
          </Card>
        ))}
      </div>

      <Card pad={0}>
        {rest.map((m, i) => {
          const lv = levelOf(m);
          return (
            <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "13px 18px", borderTop: i === 0 ? "none" : `1px solid ${T.line}` }}>
              <div style={{ width: 26, textAlign: "center", fontWeight: 800, color: T.sub, fontVariantNumeric: "tabular-nums" }}>{i + 4}</div>
              <div style={{ fontSize: 18 }}>{lv.icon}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 14.5, letterSpacing: "-0.01em" }}>{m.name}
                  {m.staff && <span style={{ marginLeft: 6, fontSize: 10.5, fontWeight: 800, color: T.gold }}>⭐ 운영진</span>}
                  {m.founder && <span style={{ marginLeft: 6, fontSize: 9.5, fontWeight: 700, color: "#9C7B2E", letterSpacing: "0.12em" }}>✦ 창립</span>}
                </div>
                <div style={{ height: 5, background: "#EDF1F0", borderRadius: 99, marginTop: 6, maxWidth: 220 }}>
                  <div style={{ height: 5, width: `${Math.min(100, (m.credits / max) * 100)}%`, background: T.grad, borderRadius: 99 }} />
                </div>

              </div>
              <UseBadge credits={m.credits} settings={settings} />
              <Pill tone="soft" style={{ minWidth: 86, justifyContent: "center" }}>{m.credits.toLocaleString()}</Pill>
            </div>
          );
        })}
      </Card>

      <Card style={{ marginTop: 14 }} pad={18}>
        <div style={{ fontWeight: 800, fontSize: 14, marginBottom: 4 }}>크레딧 규칙</div>
        <div style={{ fontSize: 12.5, color: T.sub, lineHeight: 1.7 }}>
          <b style={{ color: T.ink }}>1 크레딧 = 1원</b> · 멤버십 결제 시 사용 가능 (최소 {settings.minUse.toLocaleString()} 크레딧부터)
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginTop: 12 }}>
          <Pill tone="line" style={{ fontSize: 12 }}>메이트 소개 성공 <b style={{ color: T.coral, marginLeft: 4 }}>+{settings.mateReward.toLocaleString()}</b></Pill>
          <Pill tone="line" style={{ fontSize: 12 }}>톡방 이벤트 당첨 <b style={{ color: T.coral, marginLeft: 4 }}>관리자 지급</b></Pill>
        </div>
      </Card>
    </div>
  );
}

/* ── 멤버 관리 ── */
function Members({ members, ledger, onAdjust, onAddMember, onBumpStat, onSetLevel, settings, staffOnly }) {

  const [amt, setAmt] = useState("");

  const [newP4, setNewP4] = useState("");

  const selLedger = ledger.filter((l) => l.m === sel);

  return (
    <div>
      <SectionTitle eyebrow={`총 ${members.length}명 · 활성`} title="멤버 관리"

        <div style={{ fontSize: 12, color: T.sub, marginTop: 2, marginBottom: 10 }}>여기 등록된 이름 + 전화 뒷 4자리로만 공개 페이지 입장이 가능합니다.</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          <Input value={newName} onChange={(e) => setNewName(e.target.value)} placeholder="이름 (예: 홍길동)" style={{ flex: "1 1 140px", background: "#fff" }} />
          <Input value={newP4} inputMode="numeric" maxLength={4}

            placeholder="전화 뒷 4자리" style={{ width: 120, background: "#fff" }} />
          <Btn small disabled={!newName.trim() || newP4.length !== 4}
            onClick={() => { onAddMember(newName.trim(), newP4); setNewName(""); setNewP4(""); }}>+ 등록</Btn>

      <div style={{ display: "grid", gridTemplateColumns: sel ? "repeat(auto-fit, minmax(300px, 1fr))" : "1fr", gap: 14, alignItems: "start" }}>
        <Card pad={0} style={{ overflow: "hidden" }}>
          <div style={{ display: "grid", gridTemplateColumns: "2fr .9fr .9fr .9fr 1.1fr", padding: "10px 18px", fontSize: 11.5, fontWeight: 800, color: T.sub, letterSpacing: "0.06em", background: "#FAFCFB", borderBottom: `1px solid ${T.line}` }}>

          </div>
          {list.map((m) => (
            <div key={m.id} onClick={() => { setSel(m.id === sel ? null : m.id); setAmt(""); setReason(""); }}
              style={{ display: "grid", gridTemplateColumns: "2fr .9fr .9fr .9fr 1.1fr", padding: "12px 18px", alignItems: "center",
                borderBottom: `1px solid ${T.line}`, cursor: "pointer", background: sel === m.id ? T.gradSoft : "transparent" }}>
              <div style={{ fontWeight: 700, fontSize: 14, letterSpacing: "-0.01em", display: "flex", gap: 6, alignItems: "center" }}>
                {levelOf(m).icon} {m.name}
                {m.founder && <span style={{ fontSize: 8.5, fontWeight: 700, padding: "1.5px 6px", borderRadius: 999, letterSpacing: "0.14em", background: "linear-gradient(120deg,#FCF7EA,#F8F0DC)", color: "#9C7B2E", border: "1px solid rgba(176,142,62,.32)", whiteSpace: "nowrap" }}>✦ 창립</span>}

              <div style={{ textAlign: "right", display: "flex", gap: 6, justifyContent: "flex-end", alignItems: "center" }}>
                {staffOnly

              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {[["auctions", "🏆 낙찰", selMember.auctions], ["bids", "📝 입찰", selMember.bids], ["visits", "🚶 임장", selMember.visits || 0]].map(([f, label, cnt]) => (
                  <button key={f} onClick={() => onBumpStat(selMember.id, f)}
                    style={{ cursor: "pointer", borderRadius: 999, padding: "6px 12px", fontWeight: 700, fontSize: 12, fontFamily: "inherit",
                      background: "#fff", color: T.ink, border: `1.5px solid ${T.line}` }}>
                    {label} <b style={{ color: T.coral }}>{cnt}</b> +1

            <div style={{ margin: "0 0 10px", padding: "10px 12px", background: "#FAFCFB", borderRadius: 12, border: `1px solid ${T.line}` }}>
              <div style={{ fontSize: 12, fontWeight: 800, color: T.sub, marginBottom: 8 }}>등급 지정 <span style={{ fontWeight: 600 }}>· 수동 선택 시 고정, 자동 선택 시 활동 점수({growthScore(selMember).toFixed(1)}점)로 계산</span></div>
              <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                <button onClick={() => onSetLevel(selMember.id, 0)}
                  style={{ cursor: "pointer", borderRadius: 999, padding: "6px 11px", fontWeight: 800, fontSize: 12, fontFamily: "inherit",
                    background: manualLevelOf(selMember) === 0 ? T.grad : "#fff",
                    color: manualLevelOf(selMember) === 0 ? "#fff" : T.ink,
                    border: manualLevelOf(selMember) === 0 ? "none" : `1.5px solid ${T.line}` }}>
                  🔄 자동 (현재 {LEVELS[autoLevelOf(selMember) - 1].icon} Lv.{autoLevelOf(selMember)})
                </button>
                {LEVELS.map((lv) => (
                  <button key={lv.lv} onClick={() => onSetLevel(selMember.id, lv.lv)}
                    style={{ cursor: "pointer", borderRadius: 999, padding: "6px 11px", fontWeight: 800, fontSize: 12, fontFamily: "inherit",
                      background: manualLevelOf(selMember) === lv.lv ? T.grad : "#fff",
                      color: manualLevelOf(selMember) === lv.lv ? "#fff" : T.ink,
                      border: manualLevelOf(selMember) === lv.lv ? "none" : `1.5px solid ${T.line}` }}>
                    {lv.icon} {lv.name}
                  </button>
                ))}
              </div>
            </div>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <Pill>{selMember.credits.toLocaleString()} 크레딧</Pill>
              <UseBadge credits={selMember.credits} settings={settings} />

            <div style={{ margin: "14px 0 6px", fontWeight: 800, fontSize: 13 }}>이벤트 외 크레딧 수동 지급 / 차감</div>
            <div style={{ display: "flex", gap: 6 }}>
              <Input value={amt} onChange={(e) => setAmt(e.target.value)} placeholder="±금액" type="number" style={{ width: 92 }} />

            </div>
            <div style={{ marginTop: 8 }}>
              <Btn small disabled={!amt || !reason} onClick={() => { onAdjust(selMember.id, Number(amt), reason); setAmt(""); setReason(""); }}>기록하고 지급</Btn>
            </div>
            <div style={{ margin: "16px 0 6px", fontWeight: 800, fontSize: 13 }}>크레딧 히스토리</div>
            {selLedger.length === 0 && <div style={{ fontSize: 12.5, color: T.sub }}>아직 기록이 없어요.</div>}

              <div key={l.id} style={{ display: "flex", justifyContent: "space-between", gap: 8, padding: "8px 0", borderBottom: `1px solid ${T.line}`, fontSize: 12.5 }}>

            ))}

          </Card>
        )}
      </div>
    </div>
  );
}

/* ── 데일리 이벤트: 카톡에서 진행 → 참가자 체크 & 당첨 기록 ── */
function Events({ members, log, onLogEvent, settings }) {
  const [type, setType] = useState("퀴즈");
  const [title, setTitle] = useState("");
  const [note, setNote] = useState("");
  const [filter, setFilter] = useState("");
  const [parts, setParts] = useState([]); // 참가자 id 배열
  const [winAmt, setWinAmt] = useState({}); // { id: amount } — 당첨자만

  const togglePart = (id) => {
    if (parts.includes(id)) {
      setParts(parts.filter((x) => x !== id));
      if (winAmt[id] != null) { const w = { ...winAmt }; delete w[id]; setWinAmt(w); }
    } else setParts([...parts, id]);
  };
  const toggleWin = (id) => {
    const w = { ...winAmt };
    if (w[id] != null) delete w[id]; else w[id] = 3000;
    setWinAmt(w);
  };
  const filtered = members.filter((m) => m.realName.includes(filter) || m.name.includes(filter));
  const selectAllFiltered = () => setParts([...new Set([...parts, ...filtered.map((m) => m.id)])]);
  const clearAll = () => { setParts([]); setWinAmt({}); };

  const winners = Object.entries(winAmt).map(([id, amount]) => ({ m: Number(id), amount: Number(amount) || 0 }));
  const total = winners.reduce((s, w) => s + w.amount, 0);
  const canSubmit = parts.length > 0; // 0 지급 허용 (기록만) · 제목 미입력 시 자동 생성
  const submit = () => {
    const d = new Date();
    const autoTitle = `${d.getMonth() + 1}/${d.getDate()} ${typeMeta.label}`;
    onLogEvent({ type, title: title.trim() || autoTitle, note: note.trim(), participants: parts, winners });
    setTitle(""); setNote(""); setParts([]); setWinAmt({}); setFilter("");
  };
  const typeMeta = EVENT_TYPES.find((e) => e.k === type);

  return (
    <div>
      <SectionTitle eyebrow="게임·퀴즈는 카톡방에서 · 여기엔 참가 체크" title="데일리 이벤트" right={<Pill tone="line">1 크레딧 = 1원</Pill>} />

      <Card pad={0} style={{ overflow: "hidden", marginBottom: 14 }}>
        <div style={{ background: T.grad, padding: "16px 20px", color: "#fff" }}>
          <div style={{ fontSize: 11.5, fontWeight: 800, letterSpacing: "0.12em", opacity: 0.9 }}>NEW EVENT LOG</div>
          <div style={{ fontSize: 17, fontWeight: 800, letterSpacing: "-0.02em", marginTop: 2 }}>카톡 이벤트가 끝나면 참가자를 눌러 체크하세요</div>
          <div style={{ fontSize: 12.5, opacity: 0.9, marginTop: 3 }}>참가 횟수는 개근왕 집계에, 당첨 크레딧은 리더보드에 바로 반영됩니다.</div>
        </div>

        <div style={{ padding: 18 }}>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
            {EVENT_TYPES.map((e) => (
              <button key={e.k} onClick={() => setType(e.k)}
                style={{ cursor: "pointer", borderRadius: 999, padding: "8px 14px", fontWeight: 800, fontSize: 12.5, fontFamily: "inherit",
                  background: type === e.k ? T.grad : "#fff", color: type === e.k ? "#fff" : T.sub,
                  boxShadow: type === e.k ? "0 4px 12px rgba(53,160,190,.22)" : "none",
                  border: type === e.k ? "none" : `1.5px solid ${T.line}` }}>
                {e.icon} {e.label}
              </button>
            ))}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 }}>
            <Input value={title} onChange={(e) => setTitle(e.target.value)} placeholder={`${typeMeta.icon} 이벤트 제목 (예: 7/7 화요 퀴즈)`} style={{ padding: "10px 12px" }} />
            <Input value={note} onChange={(e) => setNote(e.target.value)} placeholder="메모 (선택) — 정답, 실제 낙찰가 등" style={{ padding: "10px 12px" }} />
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
            <div style={{ fontWeight: 800, fontSize: 13 }}>참가자 체크 <span style={{ color: T.peri }}>({parts.length}명)</span></div>
            <Input value={filter} onChange={(e) => setFilter(e.target.value)} placeholder="이름 검색" style={{ padding: "6px 12px", fontSize: 12.5, width: 110, borderRadius: 999 }} />
            <button onClick={selectAllFiltered} style={{ border: `1.5px solid ${T.line}`, background: "#fff", cursor: "pointer", borderRadius: 999, padding: "5px 11px", fontWeight: 700, fontSize: 11.5, fontFamily: "inherit", color: T.sub }}>표시된 전원 추가</button>
            <button onClick={clearAll} style={{ border: `1.5px solid ${T.line}`, background: "#fff", cursor: "pointer", borderRadius: 999, padding: "5px 11px", fontWeight: 700, fontSize: 11.5, fontFamily: "inherit", color: T.sub }}>전체 해제</button>
          </div>

          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, padding: 12, background: "#FAFCFB", borderRadius: 14, border: `1px solid ${T.line}`, maxHeight: 190, overflowY: "auto" }}>
            {filtered.map((m) => {
              const on = parts.includes(m.id);
              return (
                <button key={m.id} onClick={() => togglePart(m.id)}
                  style={{ cursor: "pointer", borderRadius: 999, padding: "6px 12px", fontWeight: 700, fontSize: 12.5, fontFamily: "inherit",
                    background: on ? T.grad : "#fff", color: on ? "#fff" : T.ink,
                    border: on ? "none" : `1.5px solid ${T.line}`, transition: "all .1s ease" }}>
                  {on ? "✓ " : ""}{m.realName}
                </button>
              );
            })}
            {filtered.length === 0 && <div style={{ fontSize: 12.5, color: T.sub, padding: 6 }}>검색 결과가 없어요</div>}
          </div>

          {parts.length > 0 && (
            <>
              <div style={{ fontWeight: 800, fontSize: 13, margin: "14px 0 8px" }}>당첨자 지정 <span style={{ fontSize: 11.5, color: T.sub, fontWeight: 600 }}>· 크레딧 0으로 두면 당첨 기록만 남습니다</span></div>
              {parts.map((id) => {
                const m = members.find((x) => x.id === id);
                const won = winAmt[id] != null;
                return (
                  <div key={id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 12px",
                    background: won ? T.gradSoft : "#fff", border: `1px solid ${won ? "transparent" : T.line}`, borderRadius: 12, marginBottom: 5 }}>

        {log.map((e, i) => {

                <div style={{ fontWeight: 800, fontSize: 14.5, letterSpacing: "-0.01em" }}>{e.title}</div>
                <Pill tone="line" style={{ fontSize: 11 }}>{shortDate(e.date)}</Pill>
                <Pill tone="soft" style={{ fontSize: 11 }}>{meta.label}</Pill>
                <Pill tone="mute" style={{ fontSize: 11 }}>참가 {e.participants.length}명</Pill>
              </div>
              {e.note && <div style={{ fontSize: 12.5, color: T.sub, marginTop: 4 }}>{e.note}</div>}
              <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                {e.winners.map((w) => {
                  const mem = members.find((x) => x.id === w.m);

                })}
                {partOnly.length > 0 && (
                  <Pill tone="line" style={{ fontSize: 11 }}>
                    참가: {partOnly.map((p) => members.find((x) => x.id === p)?.realName).filter(Boolean).slice(0, 4).join(", ")}

                  </Pill>
                )}
              </div>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

}

          <div style={{ fontSize: 34 }}>🌱</div>
          <div style={{ fontSize: 11.5, fontWeight: 800, letterSpacing: "0.2em", opacity: 0.9, marginTop: 6 }}>해피테크 · GROW IN</div>
          <div style={{ fontSize: 24, fontWeight: 800, letterSpacing: "-0.03em", marginTop: 2 }}>그로인 커뮤니티</div>
          <div style={{ fontSize: 13, opacity: 0.9, marginTop: 4 }}>크레딧 · 랭킹 · 인사이트 아카이브</div>
        </div>

        <div style={{ background: "#fff", borderRadius: 20, padding: 24, boxShadow: "0 20px 50px rgba(28,35,51,.25)" }}>
          <div style={{ fontWeight: 800, fontSize: 15, letterSpacing: "-0.01em", marginBottom: 4 }}>멤버 확인</div>
          <div style={{ fontSize: 12, color: T.sub, marginBottom: 16, lineHeight: 1.5 }}>
            멤버십 결제 시 사용한 <b style={{ color: T.ink }}>이름</b>과 <b style={{ color: T.ink }}>전화번호 뒷 4자리</b>를 입력하세요.
          </div>

          <div style={{ fontSize: 12, fontWeight: 800, color: T.sub, marginBottom: 4 }}>이름</div>
          <Input value={name} onChange={(e) => { setName(e.target.value); setError(""); }} placeholder="예: 홍길동"
            style={{ width: "100%", boxSizing: "border-box", marginBottom: 12 }} />

          <div style={{ fontSize: 12, fontWeight: 800, color: T.sub, marginBottom: 4 }}>전화번호 뒷 4자리</div>
          <Input value={p4} inputMode="numeric" maxLength={4}
            onChange={(e) => { setP4(e.target.value.replace(/[^0-9]/g, "").slice(0, 4)); setError(""); }}
            onKeyDown={(e) => e.key === "Enter" && name.trim() && p4.length === 4 && !busy && tryEnter()}
            placeholder="예: 1234"
            style={{ width: "100%", boxSizing: "border-box", letterSpacing: "0.3em", fontWeight: 800 }} />

          {error && (
            <div style={{ marginTop: 12, padding: "10px 12px", background: "rgba(225,95,80,.08)", border: `1px solid rgba(225,95,80,.25)`, borderRadius: 10, fontSize: 12.5, color: T.coral, fontWeight: 700, lineHeight: 1.5 }}>
              {error}
            </div>
          )}

          <div style={{ marginTop: 16 }}>
            <Btn style={{ width: "100%" }} disabled={!name.trim() || p4.length !== 4 || busy} onClick={tryEnter}>
              {busy ? "확인 중..." : "입장하기"}
            </Btn>
          </div>
          <div style={{ fontSize: 11, color: T.sub, textAlign: "center", marginTop: 12, lineHeight: 1.6 }}>
            입장이 안 되나요? 멤버 등록은 운영진이 진행합니다.<br/>단톡방에서 해피테크에게 문의해주세요.
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── 앱 셸 (구글 시트 연동 · 관리자 PIN) ── */
function App() {
  const live = LIVE();
  const [phase, setPhase] = useState(live ? "loading" : "ready"); // loading | ready | error
  const [mode, setMode] = useState("public"); // 멤버가 보는 페이지가 기본
  const [tab, setTab] = useState("board");
  const [members, setMembers] = useState(live ? [] : SEED_MEMBERS);
  const [ledger, setLedger] = useState(live ? [] : SEED_LEDGER);
  const [eventLog, setEventLog] = useState(live ? [] : SEED_EVENT_LOG);
  const [insights, setInsights] = useState(live ? [] : SEED_INSIGHTS);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [viewer, setViewer] = useState(null);
  const [adminKey, setAdminKey] = useState(null); // 관리자/운영진 PIN (인증 후 보관)
  const [adminRole, setAdminRole] = useState(null); // "admin" | "staff"
  const [pinPrompt, setPinPrompt] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [pinErr, setPinErr] = useState("");
  const [toast, setToast] = useState(null);

  const say = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2800); };
  const today = new Date().toISOString().slice(5, 10);

  /* 등급 자동 업그레이드 기준을 설정값과 동기화 */
  LEVEL_PTS = [
    Number(settings.lv2Pts) || DEFAULT_SETTINGS.lv2Pts,
    Number(settings.lv3Pts) || DEFAULT_SETTINGS.lv3Pts,
    Number(settings.lv4Pts) || DEFAULT_SETTINGS.lv4Pts,
    Number(settings.lv5Pts) || DEFAULT_SETTINGS.lv5Pts,
  ];

  async function refresh(key) {
    try {
      const d = await api("all", { adminKey: key || adminKey || undefined });
      setMembers(d.members); setLedger(d.ledger); setEventLog(d.events);
      setInsights(d.insights); if (d.settings) setSettings({ ...DEFAULT_SETTINGS, ...d.settings });
      setPhase("ready");
    } catch (e) { setPhase("error"); }
  }
  useEffect(() => { if (live) refresh(); }, []);

  /* ── 로그인 (공개 페이지) ── */
  const onLogin = async (name, p4) => {
    if (!live) {
      const found = members.find((m) => m.realName === name && m.phone4 === p4);
      if (found) { setViewer(found.id); return { ok: true }; }
      return { ok: false, error: members.some((m) => m.realName === name) ? "전화번호 뒷 4자리가 등록 정보와 달라요." : "등록된 멤버가 아니에요. 운영진에게 등록을 요청해주세요." };
    }
    try {
      const d = await api("login", { name, p4 });
      setViewer(d.memberId); return { ok: true };
    } catch (e) { return { ok: false, error: e.message }; }
  };

  /* ── 관리자 진입 ── */
  const wantAdmin = () => {
    if (!live) { setAdminRole("admin"); setMode("admin"); return; } // 데모는 자유 입장
    if (adminKey) { setMode("admin"); return; }
    setPinPrompt(true); setPinInput(""); setPinErr("");
  };
  const tryPin = async () => {
    try {
      const r = await api("adminLogin", { pin: pinInput });
      const role = (r && r.role) || "admin";
      setAdminKey(pinInput); setAdminRole(role); setPinPrompt(false); setMode("admin");
      setTab(role === "staff" ? "members" : "board");
      refresh(pinInput); // 인증 키로 재조회 (전화번호 포함)
    } catch (e) { setPinErr(e.message); }
  };

  /* ── 로컬 상태 반영 헬퍼 ── */
  const addCreditsLocal = (pairs) => setMembers((M) => M.map((m) => {
    const hit = pairs.filter((p) => p.m === m.id).reduce((s, p) => s + p.amount, 0);
    return hit ? { ...m, credits: m.credits + hit } : m;
  }));
  const fail = (e) => say("⚠️ " + (e.message || "저장 실패 — 새로고침 후 다시 시도해주세요"));

  /* ── 쓰기 핸들러 (라이브: 시트 저장 + 로컬 반영) ── */
  const onAdjust = async (mid, amount, reason) => {
    try {
      if (live) await api("adjustCredit", { adminKey, memberId: mid, amount, reason });
      addCreditsLocal([{ m: mid, amount }]);
      setLedger((L) => [...L, { id: nid(), m: mid, date: today, type: "수동", reason, amount }]);
      say(`크레딧 ${amount >= 0 ? "+" : ""}${amount.toLocaleString()} 기록 완료`);
    } catch (e) { fail(e); }
  };

  const onAddMember = async (realName, phone4) => {
    if (members.some((m) => m.realName === realName && m.phone4 === phone4)) { say("이미 등록된 멤버예요"); return; }
    try {
      let newM;
      if (live) newM = await api("addMember", { adminKey, realName, phone4 });
      else {
        const id = nid();
        newM = { id, name: `${realName}/${phone4}`, realName, phone4, joined: today, founder: false, credits: 0, parts: 0, wins: 0, auctions: 0, bids: 0, invites: 0, visits: 0, staff: false, level: 0 };
      }
      setMembers((M) => [...M, newM]);
      say(`${realName}님 등록 완료 · 이제 입장 가능`);
    } catch (e) { fail(e); }
  };

  const onLogEvent = async (ev) => {
    try {
      let saved = { ...ev, id: nid(), date: today };
      if (live) saved = await api("logEvent", { adminKey, event: ev });
      addCreditsLocal(saved.winners.filter((w) => w.amount > 0).map((w) => ({ m: w.m, amount: w.amount })));
      const winSet = new Set(saved.winners.map((w) => w.m));
      const isVisit = saved.type === "임장";
      setMembers((M) => M.map((m) => {
        let np = m.parts, nv = m.visits || 0, nw = m.wins;
        if (saved.participants.includes(m.id)) { if (isVisit) nv += 1; else np += 1; }
        if (winSet.has(m.id)) nw += 1;
        return (np !== m.parts || nv !== (m.visits || 0) || nw !== m.wins) ? { ...m, parts: np, visits: nv, wins: nw } : m;
      }));
      setLedger((L) => [...L, ...saved.winners.filter((w) => w.amount > 0).map((w) => ({ id: nid(), m: w.m, date: saved.date, type: saved.type, reason: `${saved.title} 당첨`, amount: w.amount }))]);
      setEventLog((E) => [saved, ...E]);
      say(`「${saved.title}」 참가 ${saved.participants.length}명 · 당첨 ${saved.winners.length}명 기록 완료`);
    } catch (e) { fail(e); }
  };

  const onBumpStat = async (memberId, field) => {
    try {
      if (live) await api("bumpStat", { adminKey, memberId, field, delta: 1 });
      setMembers((M) => M.map((m) => m.id === memberId ? { ...m, [field]: (m[field] || 0) + 1 } : m));
      const labels = { auctions: "낙찰", bids: "입찰", visits: "임장" };
      say(`${labels[field]} 기록 +1 완료`);
    } catch (e) { fail(e); }
  };

  const onSetLevel = async (memberId, level) => {
    try {
      if (live) await api("setLevel", { adminKey, memberId, level });
      setMembers((M) => M.map((m) => m.id === memberId ? { ...m, level } : m));
      if (level === 0) { say("등급 변경 완료 · 🔄 자동 (활동 점수 기준)"); }
      else { const lv = LEVELS[level - 1]; say(`등급 변경 완료 · ${lv.icon} ${lv.name} 고정`); }
    } catch (e) { fail(e); }
  };

  const onApprove = async (inviterId, newbieName) => {
    try {
      if (live) await api("approveMate", { adminKey, inviterId, newbieName });
      addCreditsLocal([{ m: inviterId, amount: settings.mateReward }]);
      setLedger((L) => [...L, { id: nid(), m: inviterId, date: today, type: "메이트", reason: `메이트 소개 · ${newbieName}님 결제 확인`, amount: settings.mateReward }]);
      setMembers((M) => M.map((m) => m.id === inviterId ? { ...m, invites: m.invites + 1 } : m));
      const inviter = members.find((m) => m.id === inviterId);
      say(`${inviter?.realName}님에게 +${settings.mateReward.toLocaleString()} 크레딧 지급`);
    } catch (e) { fail(e); }
  };

  const onAddInsight = async ({ cat, title, body }) => {
    try {
      let saved = { id: nid(), date: today, cat, title, body };
      if (live) saved = await api("addInsight", { adminKey, insight: { cat, title, body } });
      setInsights((I) => [saved, ...I]);
      say("인사이트가 아카이브에 저장됐어요");
    } catch (e) { fail(e); }
  };
  const onDeleteInsight = async (id) => {
    try {
      if (live) await api("deleteInsight", { adminKey, id });
      setInsights((I) => I.filter((i) => i.id !== id));
    } catch (e) { fail(e); }
  };
  const persistSettings = (s) => {
    setSettings(s);
    if (live) api("saveSettings", { adminKey, settings: s }).then(() => say("설정 저장 완료")).catch(fail);
  };

  const total = members.reduce((s, m) => s + m.credits, 0);
  const usable = members.filter((m) => canUse(m.credits, settings)).length;
  const isStaff = adminRole === "staff";
  const STAFF_TABS = ["members", "insights"]; // 운영진 허용 탭 (크레딧 관련 제외)
  const TABS = [
    ["board", "리더보드"], ["members", "멤버 관리"], ["events", "데일리 이벤트"],
    ["mate", "그로인 메이트"], ["insights", "인사이트"], ["awards", "시상식"], ["settings", "설정"],
  ].filter(([k]) => !isStaff || STAFF_TABS.includes(k));
  const effTab = TABS.some(([k]) => k === tab) ? tab : TABS[0][0];
  const shellFont = { fontFamily: `-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Malgun Gothic",sans-serif`, WebkitFontSmoothing: "antialiased" };

  if (phase === "loading") return (
    <div style={{ minHeight: "100vh", background: T.grad, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", color: "#fff", ...shellFont }}>
      <div style={{ fontSize: 40 }}>🌱</div>
      <div style={{ fontWeight: 800, fontSize: 17, marginTop: 10, letterSpacing: "-0.02em" }}>그로인 커뮤니티</div>
      <div style={{ fontSize: 13, opacity: 0.85, marginTop: 4 }}>데이터를 불러오는 중...</div>
    </div>
  );
  if (phase === "error") return (
    <div style={{ minHeight: "100vh", background: T.bg, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", ...shellFont, padding: 20, textAlign: "center" }}>
      <div style={{ fontSize: 36 }}>🌧</div>
      <div style={{ fontWeight: 800, fontSize: 16, marginTop: 10 }}>데이터를 불러오지 못했어요</div>
      <div style={{ fontSize: 13, color: T.sub, marginTop: 6, lineHeight: 1.6 }}>구글 시트 연동 URL이 올바른지, Apps Script가<br/>"모든 사용자" 액세스로 배포됐는지 확인해주세요.</div>
      <div style={{ marginTop: 14 }}><Btn small onClick={() => { setPhase("loading"); refresh(); }}>다시 시도</Btn></div>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.ink, ...shellFont }}>
      <div style={{ background: T.ink, color: "#fff", padding: "6px 12px", display: "flex", justifyContent: "center", alignItems: "center", gap: 6 }}>
        <span style={{ fontSize: 10.5, opacity: 0.6, fontWeight: 700, letterSpacing: "0.08em" }}>{live ? "● LIVE" : "DEMO"}</span>
        <button onClick={() => setMode("public")}
          style={{ border: "none", cursor: "pointer", padding: "4px 12px", borderRadius: 999, fontSize: 11.5, fontFamily: "inherit", fontWeight: 800,
            background: mode === "public" ? T.grad : "transparent", color: mode === "public" ? "#fff" : "rgba(255,255,255,.6)" }}>
          👥 커뮤니티
        </button>
        <button onClick={wantAdmin}
          style={{ border: "none", cursor: "pointer", padding: "4px 12px", borderRadius: 999, fontSize: 11.5, fontFamily: "inherit", fontWeight: 800,
            background: mode === "admin" ? T.grad : "transparent", color: mode === "admin" ? "#fff" : "rgba(255,255,255,.6)" }}>
          🛠 관리자
        </button>
      </div>

      {mode === "public" ? (
        <PublicPage members={members} ledger={ledger} log={eventLog} insights={insights} settings={settings}
          viewer={viewer} onLogin={onLogin} onLogout={() => setViewer(null)} />
      ) : (
        <>
          <div style={{ background: T.grad, color: "#fff", padding: "26px 22px 62px" }}>
            <div style={{ maxWidth: 980, margin: "0 auto" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
                <div>
                  <div style={{ fontSize: 11.5, fontWeight: 800, letterSpacing: "0.16em", opacity: 0.9 }}>해피테크 · GROW IN · {isStaff ? "STAFF" : "ADMIN"}</div>
                  <div style={{ fontSize: 27, fontWeight: 800, letterSpacing: "-0.03em", marginTop: 2 }}>그로인 커뮤니티</div>
                  <div style={{ fontSize: 13, opacity: 0.9, marginTop: 3 }}>{isStaff ? "운영진 모드 · 멤버 등록과 인사이트를 관리할 수 있어요" : `1 크레딧 = 1원 · ${settings.minUse.toLocaleString()} 크레딧부터 결제 시 사용 가능`}</div>
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                  <Pill style={{ background: "rgba(255,255,255,.18)", fontSize: 12.5 }}>멤버 {members.length}명</Pill>
                  {isStaff
                    ? <Pill tone="gold" style={{ fontSize: 12.5 }}>⭐ 운영진</Pill>
                    : <>
                        <Pill style={{ background: "rgba(255,255,255,.18)", fontSize: 12.5 }}>사용가능 {usable}명</Pill>
                        <Pill tone="coral" style={{ fontSize: 12.5 }}>누적 {total.toLocaleString()} 크레딧</Pill>
                      </>}
                  {live && <button onClick={() => refresh()} title="시트에서 다시 불러오기"
                    style={{ border: "1px solid rgba(255,255,255,.4)", background: "transparent", color: "#fff", cursor: "pointer", borderRadius: 999, padding: "4px 12px", fontSize: 12, fontWeight: 700, fontFamily: "inherit" }}>↻ 동기화</button>}
                </div>
              </div>
            </div>
          </div>

          <div style={{ maxWidth: 980, margin: "-34px auto 0", padding: "0 16px 60px" }}>
            <div style={{ display: "flex", gap: 6, background: "#fff", borderRadius: 999, padding: 6, border: `1px solid ${T.line}`,
              boxShadow: "0 10px 30px rgba(28,35,51,.08)", overflowX: "auto", marginBottom: 20 }}>
              {TABS.map(([k, label]) => (
                <button key={k} onClick={() => setTab(k)}
                  style={{ flex: "1 0 auto", border: "none", cursor: "pointer", padding: "10px 16px", borderRadius: 999,
                    fontWeight: 800, fontSize: 13.5, letterSpacing: "-0.01em", fontFamily: "inherit", whiteSpace: "nowrap",
                    background: effTab === k ? T.grad : "transparent", color: effTab === k ? "#fff" : T.sub, transition: "all .15s ease" }}>
                  {label}
                </button>
              ))}
            </div>

            {effTab === "board" && <Leaderboard members={members} settings={settings} />}
            {effTab === "members" && <Members members={members} ledger={ledger} onAdjust={onAdjust} onAddMember={onAddMember} onBumpStat={onBumpStat} onSetLevel={onSetLevel} settings={settings} staffOnly={isStaff} />}
            {effTab === "events" && <Events members={members} log={eventLog} onLogEvent={onLogEvent} settings={settings} />}
            {effTab === "mate" && <Mate members={members} onApprove={onApprove} settings={settings} />}
            {effTab === "insights" && <Insights insights={insights} onAdd={onAddInsight} onDelete={onDeleteInsight} />}
            {effTab === "awards" && <Awards members={members} settings={settings} />}
            {effTab === "settings" && <Settings settings={settings} setSettings={persistSettings} />}
          </div>
        </>
      )}

      {/* 관리자 PIN 입력 */}
      {pinPrompt && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(28,35,51,.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20 }}>
          <div style={{ background: "#fff", borderRadius: 20, padding: 24, width: "100%", maxWidth: 320, boxShadow: "0 20px 50px rgba(28,35,51,.35)" }}>
            <div style={{ fontWeight: 800, fontSize: 16, letterSpacing: "-0.02em" }}>🛠 관리자 · 운영진 인증</div>
            <div style={{ fontSize: 12.5, color: T.sub, margin: "6px 0 14px" }}>관리자 PIN 또는 운영진 PIN을 입력하세요.<br/><span style={{ fontSize: 11.5 }}>운영진 PIN으로는 멤버 등록·인사이트만 관리할 수 있어요.</span></div>
            <Input type="password" value={pinInput} inputMode="numeric"
              onChange={(e) => { setPinInput(e.target.value); setPinErr(""); }}
              onKeyDown={(e) => e.key === "Enter" && pinInput && tryPin()}
              placeholder="PIN" style={{ width: "100%", boxSizing: "border-box", letterSpacing: "0.3em", fontWeight: 800, textAlign: "center" }} />
            {pinErr && <div style={{ fontSize: 12, color: T.coral, fontWeight: 700, marginTop: 8 }}>{pinErr}</div>}
            <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
              <Btn small tone="ghost" style={{ flex: 1 }} onClick={() => setPinPrompt(false)}>취소</Btn>
              <Btn small style={{ flex: 1 }} disabled={!pinInput} onClick={tryPin}>확인</Btn>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: T.ink, color: "#fff",
          padding: "12px 22px", borderRadius: 999, fontWeight: 700, fontSize: 13.5, boxShadow: "0 12px 30px rgba(28,35,51,.3)", zIndex: 50, maxWidth: "90vw" }}>
          {toast}
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
