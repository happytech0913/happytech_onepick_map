const Pill = ({ children, tone = "grad", style }) => (
  <span
    style={{
      display: "inline-flex", alignItems: "center", gap: 4,
      padding: "3px 11px", borderRadius: 999, fontWeight: 800,
      fontSize: 13, letterSpacing: "-0.01em", whiteSpace: "nowrap",

      ...(tone === "grad" && { background: T.grad, color: "#fff" }),
      ...(tone === "coral" && { background: T.coral, color: "#fff" }),
      ...(tone === "soft" && { background: T.gradSoft, color: T.ink }),
      ...(tone === "line" && { background: "#fff", color: T.sub, border: `1px solid ${T.line}`, fontWeight: 600 }),
      ...(tone === "gold" && { background: T.gold, color: "#fff" }),
      ...(tone === "mute" && { background: "#EDF1F0", color: T.sub, fontWeight: 700 }),
      ...style,
    }}
  >{children}</span>
);

const Card = ({ children, style, pad = 20 }) => (
  <div style={{ background: T.card, borderRadius: 18, border: `1px solid ${T.line}`, padding: pad, ...style }}>{children}</div>
);

const SectionTitle = ({ eyebrow, title, right }) => (
  <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", margin: "4px 2px 14px", gap: 10, flexWrap: "wrap" }}>

    </div>
    {right}
  </div>
);

const Btn = ({ children, onClick, tone = "grad", small, disabled, style }) => (
  <button
    onClick={onClick} disabled={disabled}
    style={{
      border: "none", cursor: disabled ? "default" : "pointer",
      padding: small ? "7px 14px" : "11px 20px",
      borderRadius: 999, fontWeight: 800, fontSize: small ? 13 : 14.5,
      letterSpacing: "-0.01em", fontFamily: "inherit",
      opacity: disabled ? 0.45 : 1, transition: "transform .12s ease",
      ...(tone === "grad" && { background: T.grad, color: "#fff", boxShadow: "0 4px 14px rgba(53,160,190,.25)" }),
      ...(tone === "coral" && { background: T.coral, color: "#fff" }),
      ...(tone === "ghost" && { background: "#fff", color: T.ink, border: `1.5px solid ${T.line}` }),
      ...style,
    }}
    onMouseDown={(e) => !disabled && (e.currentTarget.style.transform = "scale(.97)")}
    onMouseUp={(e) => (e.currentTarget.style.transform = "scale(1)")}
    onMouseLeave={(e) => (e.currentTarget.style.transform = "scale(1)")}
  >{children}</button>
);

function Leaderboard({ members, settings }) {
  const ranked = [...members].sort((a, b) => b.credits - a.credits);
  const top3 = ranked.slice(0, 3);
  const rest = ranked.slice(3);
  const medal = ["🥇", "🥈", "🥉"];
  const max = ranked[0]?.credits || 1;

  return (
    <div>
      <SectionTitle eyebrow="3분기 · 7월 1주차" title="그로인 크레딧 리더보드" right={<Pill tone="line">매주 월요일 단톡방 공유</Pill>} />
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(180px,1fr))", gap: 12, marginBottom: 16 }}>
        {top3.map((m, i) => (
          <Card key={m.id} pad={18} style={{ position: "relative", overflow: "hidden",
            border: i === 0 ? "1.5px solid transparent" : `1px solid ${T.line}`,
            background: i === 0 ? `linear-gradient(#fff,#fff) padding-box, ${T.grad} border-box` : T.card }}>
            <div style={{ position: "absolute", top: -18, right: -8, fontSize: 64, opacity: 0.12 }}>{levelOf(m.credits, settings).icon}</div>
            <div style={{ fontSize: 24 }}>{medal[i]}</div>
            <div style={{ fontWeight: 800, fontSize: 16.5, letterSpacing: "-0.02em", marginTop: 4 }}>{m.name}</div>
            <div style={{ color: T.sub, fontSize: 12.5, marginTop: 2 }}>{levelOf(m.credits, settings).icon} {levelOf(m.credits, settings).name} · 참가 {m.parts}회 · 우승 {m.wins}회</div>
            <div style={{ marginTop: 10, display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
              <Pill>{m.credits.toLocaleString()} 크레딧</Pill>
              <UseBadge credits={m.credits} settings={settings} />
            </div>
          </Card>
        ))}
      </div>

      <Card pad={0}>
        {rest.map((m, i) => {
          const lv = levelOf(m.credits, settings);
          const nx = nextLevel(m.credits, settings);
          return (
            <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "13px 18px", borderTop: i === 0 ? "none" : `1px solid ${T.line}` }}>
              <div style={{ width: 26, textAlign: "center", fontWeight: 800, color: T.sub, fontVariantNumeric: "tabular-nums" }}>{i + 4}</div>
              <div style={{ fontSize: 18 }}>{lv.icon}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 14.5, letterSpacing: "-0.01em" }}>{m.name}
                  {m.founder && <span style={{ marginLeft: 6, fontSize: 10.5, fontWeight: 800, color: T.peri }}>창립멤버</span>}
                </div>
                <div style={{ height: 5, background: "#EDF1F0", borderRadius: 99, marginTop: 6, maxWidth: 220 }}>
                  <div style={{ height: 5, width: `${Math.min(100, (m.credits / max) * 100)}%`, background: T.grad, borderRadius: 99 }} />
                </div>
                {nx && <div style={{ fontSize: 11, color: T.sub, marginTop: 3 }}>{nx.icon} {nx.name}까지 {(nx.min - m.credits).toLocaleString()}</div>}
              </div>
              <UseBadge credits={m.credits} settings={settings} />
              <Pill tone="soft" style={{ minWidth: 86, justifyContent: "center" }}>{m.credits.toLocaleString()}</Pill>
            </div>
          );
        })}
      </Card>

      <Card style={{ marginTop: 14 }} pad={18}>
        <div style={{ fontWeight: 800, fontSize: 14, marginBottom: 4 }}>크레딧 규칙</div>
        <div style={{ fontSize: 12.5, color: T.sub, lineHeight: 1.7 }}>
          <b style={{ color: T.ink }}>1 크레딧 = 1원</b> · 멤버십 결제 시 사용 가능 (최소 {settings.minUse.toLocaleString()} 크레딧부터)
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginTop: 12 }}>
          <Pill tone="line" style={{ fontSize: 12 }}>메이트 소개 성공 <b style={{ color: T.coral, marginLeft: 4 }}>+{settings.mateReward.toLocaleString()}</b></Pill>
          <Pill tone="line" style={{ fontSize: 12 }}>톡방 이벤트 당첨 <b style={{ color: T.coral, marginLeft: 4 }}>관리자 지급</b></Pill>
        </div>
      </Card>
    </div>
  );
}

  const selLedger = ledger.filter((l) => l.m === sel);

  return (
    <div>
      <SectionTitle eyebrow={`총 ${members.length}명 · 활성`} title="멤버 관리"
        right={<Input value={q} onChange={(e) => setQ(e.target.value)} placeholder="이름 검색" style={{ width: 150, padding: "8px 16px", borderRadius: 999 }} />} />

      <Card pad={16} style={{ marginBottom: 14, background: T.gradSoft, border: "none" }}>
        <div style={{ fontWeight: 800, fontSize: 14, letterSpacing: "-0.01em" }}>신규 멤버 등록 (공개 페이지 입장 허용)</div>
        <div style={{ fontSize: 12, color: T.sub, marginTop: 2, marginBottom: 10 }}>여기 등록된 이름 + 전화 뒷 4자리로만 공개 페이지 입장이 가능합니다.</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          <Input value={newName} onChange={(e) => setNewName(e.target.value)} placeholder="이름 (예: 홍길동)" style={{ flex: "1 1 140px", background: "#fff" }} />
          <Input value={newP4} inputMode="numeric" maxLength={4}
            onChange={(e) => setNewP4(e.target.value.replace(/[^0-9]/g, "").slice(0, 4))}
            placeholder="전화 뒷 4자리" style={{ width: 120, background: "#fff" }} />
          <Btn small disabled={!newName.trim() || newP4.length !== 4}
            onClick={() => { onAddMember(newName.trim(), newP4); setNewName(""); setNewP4(""); }}>+ 등록</Btn>
        </div>
      </Card>

      <div style={{ display: "grid", gridTemplateColumns: sel ? "1.4fr 1fr" : "1fr", gap: 14, alignItems: "start" }}>
        <Card pad={0} style={{ overflow: "hidden" }}>
          <div style={{ display: "grid", gridTemplateColumns: "2fr .9fr .9fr .9fr 1.1fr", padding: "10px 18px", fontSize: 11.5, fontWeight: 800, color: T.sub, letterSpacing: "0.06em", background: "#FAFCFB", borderBottom: `1px solid ${T.line}` }}>
            <div>멤버</div><div>가입</div><div>참가</div><div>초대</div><div style={{ textAlign: "right" }}>크레딧</div>
          </div>
          {list.map((m) => (
            <div key={m.id} onClick={() => { setSel(m.id === sel ? null : m.id); setAmt(""); setReason(""); }}
              style={{ display: "grid", gridTemplateColumns: "2fr .9fr .9fr .9fr 1.1fr", padding: "12px 18px", alignItems: "center",
                borderBottom: `1px solid ${T.line}`, cursor: "pointer", background: sel === m.id ? T.gradSoft : "transparent" }}>
              <div style={{ fontWeight: 700, fontSize: 14, letterSpacing: "-0.01em", display: "flex", gap: 6, alignItems: "center" }}>
                {levelOf(m.credits, settings).icon} {m.name}
                {m.founder && <Pill tone="soft" style={{ fontSize: 10.5, padding: "1px 7px" }}>창립</Pill>}
              </div>
              <div style={{ fontSize: 12.5, color: T.sub }}>{m.joined}</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: m.parts ? T.ink : T.sub }}>{m.parts}회</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: m.invites ? T.ink : T.sub }}>{m.invites}명</div>
              <div style={{ textAlign: "right", display: "flex", gap: 6, justifyContent: "flex-end", alignItems: "center" }}>
                <UseBadge credits={m.credits} settings={settings} />
                <span style={{ fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>{m.credits.toLocaleString()}</span>
              </div>
            </div>
          ))}
        </Card>

        {selMember && (
          <Card pad={18}>
            <div style={{ fontWeight: 800, fontSize: 16, letterSpacing: "-0.02em" }}>{selMember.name}</div>
            <div style={{ fontSize: 12.5, color: T.sub, margin: "4px 0 10px" }}>
              {levelOf(selMember.credits, settings).icon} {levelOf(selMember.credits, settings).name} · 참가 {selMember.parts}회 · 우승 {selMember.wins}회 · 초대 {selMember.invites}명
            </div>
            <div style={{ fontSize: 11.5, color: T.sub, marginBottom: 10 }}>
              공개 페이지 입장 정보: <b style={{ color: T.ink }}>{selMember.realName}</b> + <b style={{ color: T.ink }}>{selMember.phone4}</b>
            </div>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <Pill>{selMember.credits.toLocaleString()} 크레딧</Pill>
              <UseBadge credits={selMember.credits} settings={settings} />
            </div>
            <div style={{ margin: "14px 0 6px", fontWeight: 800, fontSize: 13 }}>이벤트 외 크레딧 수동 지급 / 차감</div>
            <div style={{ display: "flex", gap: 6 }}>
              <Input value={amt} onChange={(e) => setAmt(e.target.value)} placeholder="±금액" type="number" style={{ width: 92 }} />
              <Input value={reason} onChange={(e) => setReason(e.target.value)} placeholder="사유 (예: 후기 작성 감사)" style={{ flex: 1 }} />
            </div>
            <div style={{ marginTop: 8 }}>
              <Btn small disabled={!amt || !reason} onClick={() => { onAdjust(selMember.id, Number(amt), reason); setAmt(""); setReason(""); }}>기록하고 지급</Btn>
            </div>
            <div style={{ margin: "16px 0 6px", fontWeight: 800, fontSize: 13 }}>크레딧 히스토리</div>
            {selLedger.length === 0 && <div style={{ fontSize: 12.5, color: T.sub }}>아직 기록이 없어요.</div>}
            {selLedger.slice().reverse().map((l) => (
              <div key={l.id} style={{ display: "flex", justifyContent: "space-between", gap: 8, padding: "8px 0", borderBottom: `1px solid ${T.line}`, fontSize: 12.5 }}>
                <div style={{ minWidth: 0 }}><span style={{ color: T.sub }}>{l.date}</span> · {l.reason}</div>
                <b style={{ color: l.amount >= 0 ? T.mint : T.coral, fontVariantNumeric: "tabular-nums", whiteSpace: "nowrap" }}>{l.amount >= 0 ? "+" : ""}{l.amount.toLocaleString()}</b>
              </div>
            ))}
          </Card>
        )}
      </div>
    </div>
  );
}

/* ── 데일리 이벤트 (참가자·당첨자 구분 기록) ── */
function Events({ members, log, onLogEvent, settings }) {
  const [type, setType] = useState("낙찰가");
  const [title, setTitle] = useState("");
  const [note, setNote] = useState("");
  const [rows, setRows] = useState([]); // [{m, name, won, amount}]
  const [pick, setPick] = useState("");

  const add = () => {
    if (!pick) return;
    const mem = members.find((x) => String(x.id) === String(pick));
    if (!mem || rows.some((r) => r.m === mem.id)) { setPick(""); return; }
    setRows([...rows, { m: mem.id, name: mem.name, won: false, amount: 3000 }]);
    setPick("");
  };
  const toggle = (i) => setRows(rows.map((r, j) => j === i ? { ...r, won: !r.won } : r));
  const setAmt = (i, v) => setRows(rows.map((r, j) => j === i ? { ...r, amount: Number(v) || 0 } : r));
  const rm = (i) => setRows(rows.filter((_, j) => j !== i));
  const setAllWon = (won, amount) => setRows(rows.map((r) => ({ ...r, won, amount: won ? amount : r.amount })));

  const canSubmit = title.trim() && rows.length > 0 && rows.every((r) => !r.won || r.amount > 0);
  const winnersCount = rows.filter((r) => r.won).length;
  const total = rows.filter((r) => r.won).reduce((s, r) => s + r.amount, 0);
  const submit = () => {
    onLogEvent({
      type, title: title.trim(), note: note.trim(),
      participants: rows.map((r) => r.m),
      winners: rows.filter((r) => r.won).map((r) => ({ m: r.m, amount: r.amount })),
    });
    setTitle(""); setNote(""); setRows([]); setPick("");
  };
  const typeMeta = EVENT_TYPES.find((e) => e.k === type);

  return (
    <div>
      <SectionTitle eyebrow="게임은 톡방에서 · 결과만 기록" title="데일리 이벤트" right={<Pill tone="line">1 크레딧 = 1원</Pill>} />

      <Card pad={0} style={{ overflow: "hidden", marginBottom: 14 }}>
        <div style={{ background: T.grad, padding: "16px 20px", color: "#fff" }}>
          <div style={{ fontSize: 11.5, fontWeight: 800, letterSpacing: "0.12em", opacity: 0.9 }}>NEW EVENT LOG</div>
          <div style={{ fontSize: 17, fontWeight: 800, letterSpacing: "-0.02em", marginTop: 2 }}>참가자와 당첨자를 함께 기록하세요</div>
          <div style={{ fontSize: 12.5, opacity: 0.9, marginTop: 3 }}>참가자에겐 참가 횟수, 당첨자에겐 크레딧이 지급됩니다. 개근왕 시상에 반영돼요.</div>
        </div>

        <div style={{ padding: 18 }}>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
            {EVENT_TYPES.map((e) => (
              <button key={e.k} onClick={() => setType(e.k)}
                style={{ cursor: "pointer", borderRadius: 999, padding: "8px 14px", fontWeight: 800, fontSize: 12.5, fontFamily: "inherit",
                  background: type === e.k ? T.grad : "#fff", color: type === e.k ? "#fff" : T.sub,
                  boxShadow: type === e.k ? "0 4px 12px rgba(53,160,190,.22)" : "none",
                  border: type === e.k ? "none" : `1.5px solid ${T.line}` }}>
                {e.icon} {e.label}
              </button>
            ))}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 }}>
            <Input value={title} onChange={(e) => setTitle(e.target.value)} placeholder={`${typeMeta.icon} 이벤트 제목 (예: 영통구 모의입찰)`} style={{ padding: "10px 12px" }} />
            <Input value={note} onChange={(e) => setNote(e.target.value)} placeholder="메모 (선택) — 실제 낙찰가, 문제 요약 등" style={{ padding: "10px 12px" }} />
          </div>

          <div style={{ fontWeight: 800, fontSize: 13, margin: "6px 0 8px", display: "flex", justifyContent: "space-between" }}>
            <span>참가자 · 당첨자</span>
            <span style={{ fontSize: 11.5, color: T.sub, fontWeight: 600 }}>추가 후 우측 토글로 당첨 지정</span>
          </div>
          <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
            <select value={pick} onChange={(e) => setPick(e.target.value)}
              style={{ flex: "1 1 220px", border: `1.5px solid ${T.line}`, borderRadius: 10, padding: "10px 12px", fontSize: 14, fontFamily: "inherit", outline: "none", background: "#fff" }}>
              <option value="">— 참가자 선택 —</option>
              {members.filter((m) => !rows.some((r) => r.m === m.id)).map((m) => (
                <option key={m.id} value={m.id}>{m.name}</option>
              ))}
            </select>
            <Btn small tone="ghost" onClick={add} disabled={!pick}>+ 추가</Btn>
          </div>

          {rows.length === 0 && (
            <div style={{ padding: "22px 16px", textAlign: "center", background: "#FAFCFB", borderRadius: 12, border: `1px dashed ${T.line}`, color: T.sub, fontSize: 13 }}>
              참가자를 한 명 이상 추가하세요. 당첨은 그 중에서 선택합니다.
            </div>
          )}
          {rows.map((r, i) => (
            <div key={r.m} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 12px", background: r.won ? T.gradSoft : "#FAFCFB",
              border: `1px solid ${r.won ? "transparent" : T.line}`, borderRadius: 12, marginBottom: 6 }}>
              <div style={{ flex: 1, fontWeight: 700, fontSize: 14 }}>{r.name}
                {r.won && <span style={{ marginLeft: 6, color: T.coral, fontSize: 12, fontWeight: 800 }}>🏅 당첨</span>}
              </div>
              <button onClick={() => toggle(i)}
                style={{ border: "none", cursor: "pointer", borderRadius: 999, padding: "5px 12px", fontWeight: 800, fontSize: 12, fontFamily: "inherit",
                  background: r.won ? T.coral : "#fff", color: r.won ? "#fff" : T.sub, boxShadow: r.won ? "none" : `inset 0 0 0 1.5px ${T.line}` }}>
                {r.won ? "당첨 해제" : "당첨 지정"}
              </button>
              {r.won && (
                <>
                  <Input type="number" value={r.amount} onChange={(e) => setAmt(i, e.target.value)}
                    style={{ width: 92, padding: "6px 10px", textAlign: "right" }} />
                  <span style={{ fontSize: 12, color: T.sub, fontWeight: 700 }}>크레딧</span>
                </>
              )}
              <button onClick={() => rm(i)} style={{ border: "none", background: "transparent", color: T.sub, cursor: "pointer", fontSize: 16, padding: "2px 6px" }}>×</button>
            </div>
          ))}

          {rows.length > 0 && (
            <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
              <span style={{ fontSize: 12, color: T.sub, alignSelf: "center" }}>빠른 액션:</span>
              {[1000, 3000, 5000].map((v) => (
                <button key={v} onClick={() => setAllWon(true, v)}
                  style={{ border: `1.5px solid ${T.line}`, background: "#fff", cursor: "pointer", borderRadius: 999, padding: "5px 12px", fontWeight: 700, fontSize: 12, fontFamily: "inherit", color: T.sub }}>
                  전원 당첨 +{v.toLocaleString()}
                </button>
              ))}
              <button onClick={() => setAllWon(false, 0)}
                style={{ border: `1.5px solid ${T.line}`, background: "#fff", cursor: "pointer", borderRadius: 999, padding: "5px 12px", fontWeight: 700, fontSize: 12, fontFamily: "inherit", color: T.sub }}>
                전원 참가만
              </button>
            </div>
          )}

          <div style={{ marginTop: 14, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
            <div style={{ fontSize: 13, color: T.sub }}>
              {rows.length > 0 && <>참가 {rows.length}명 · 당첨 {winnersCount}명 · 총 지급 <b style={{ color: T.ink }}>{total.toLocaleString()}</b> 크레딧</>}
            </div>
            <Btn disabled={!canSubmit} onClick={submit}>이벤트 기록 · 크레딧 지급</Btn>
          </div>
        </div>
      </Card>

      <SectionTitle title="최근 이벤트 로그" right={<Pill tone="line">{log.length}건</Pill>} />
      <Card pad={0}>
        {log.map((e, i) => {
          const meta = EVENT_TYPES.find((x) => x.k === e.type) || EVENT_TYPES[EVENT_TYPES.length - 1];
          const winnerIds = new Set(e.winners.map((w) => w.m));
          const partOnly = e.participants.filter((p) => !winnerIds.has(p));
          return (
            <div key={e.id} style={{ padding: "14px 18px", borderTop: i === 0 ? "none" : `1px solid ${T.line}` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <span style={{ fontSize: 18 }}>{meta.icon}</span>
                <div style={{ fontWeight: 800, fontSize: 14.5, letterSpacing: "-0.01em" }}>{e.title}</div>
                <Pill tone="line" style={{ fontSize: 11 }}>{e.date}</Pill>
                <Pill tone="soft" style={{ fontSize: 11 }}>{meta.label}</Pill>
                <Pill tone="mute" style={{ fontSize: 11 }}>참가 {e.participants.length}명</Pill>
              </div>
              {e.note && <div style={{ fontSize: 12.5, color: T.sub, marginTop: 4 }}>{e.note}</div>}
              <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                {e.winners.map((w) => {
                  const mem = members.find((x) => x.id === w.m);
                  return <Pill key={w.m} tone="coral" style={{ fontSize: 12 }}>🏅 {mem?.name} +{w.amount.toLocaleString()}</Pill>;
                })}
                {partOnly.length > 0 && (
                  <Pill tone="line" style={{ fontSize: 11 }}>
                    참가만: {partOnly.map((p) => members.find((x) => x.id === p)?.name).filter(Boolean).slice(0, 3).join(", ")}
                    {partOnly.length > 3 && ` 외 ${partOnly.length - 3}명`}
                  </Pill>
                )}
              </div>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

/* ── 그로인 메이트 ── */
function Mate({ members, onApprove, pending, setPending, settings }) {
  const inviters = [...members].filter((m) => m.invites > 0).sort((a, b) => b.invites - a.invites);
  const paidPrice = Math.max(0, 39000 - settings.mateCoupon);
  return (
    <div>
      <SectionTitle eyebrow="짝꿍할인 · 함께 성장" title="그로인 메이트"
        right={<Pill tone="coral">소개자 +{settings.mateReward.toLocaleString()} 크레딧</Pill>} />
      <Card pad={0} style={{ overflow: "hidden", marginBottom: 14 }}>
        <div style={{ background: T.gradSoft, padding: "18px 20px" }}>
          <div style={{ fontWeight: 800, fontSize: 15, letterSpacing: "-0.01em", marginBottom: 12 }}>보상 구조</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div style={{ background: "#fff", borderRadius: 12, padding: 14, border: `1px solid ${T.line}` }}>
              <div style={{ fontSize: 22 }}>🤝</div>
              <div style={{ fontSize: 12.5, color: T.sub, fontWeight: 700, marginTop: 4 }}>소개받은 메이트</div>
              <div style={{ fontWeight: 800, fontSize: 15, letterSpacing: "-0.01em", marginTop: 2 }}>{settings.mateCoupon.toLocaleString()}원 할인 쿠폰</div>
              <div style={{ fontSize: 11.5, color: T.sub, marginTop: 4, lineHeight: 1.5 }}>가입 결제 금액에서 즉시 차감</div>
            </div>
            <div style={{ background: "#fff", borderRadius: 12, padding: 14, border: `1px solid ${T.line}` }}>
              <div style={{ fontSize: 22 }}>🎁</div>
              <div style={{ fontSize: 12.5, color: T.sub, fontWeight: 700, marginTop: 4 }}>소개한 멤버</div>
              <div style={{ fontWeight: 800, fontSize: 15, letterSpacing: "-0.01em", marginTop: 2, color: T.coral }}>+{settings.mateReward.toLocaleString()} 크레딧</div>
              <div style={{ fontSize: 11.5, color: T.sub, marginTop: 4, lineHeight: 1.5 }}>다음 결제 시 사용 가능 · 1크레딧 = 1원</div>
            </div>
          </div>
          <div style={{ fontSize: 12, color: T.sub, marginTop: 12, lineHeight: 1.6 }}>
            흐름: 내 코드 공유 → 짝꿍이 가입 결제 시 코드 입력 → 관리자가 결제 확인 → 소개자에게 크레딧 자동 지급
          </div>
        </div>
      </Card>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(300px,1fr))", gap: 14, alignItems: "start" }}>
        <Card pad={18}>
          <div style={{ fontWeight: 800, fontSize: 14, marginBottom: 10 }}>승인 대기 (결제 확인 후 승인)</div>
          {pending.length === 0 && <div style={{ fontSize: 12.5, color: T.sub }}>대기 중인 소개가 없어요.</div>}
          {pending.map((p) => (
            <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 0", borderBottom: `1px solid ${T.line}`, flexWrap: "wrap" }}>
              <div style={{ flex: 1, minWidth: 160 }}>
                <div style={{ fontWeight: 700, fontSize: 13.5 }}>{p.newbie}</div>
                <div style={{ fontSize: 11.5, color: T.sub, marginTop: 2 }}>{p.code} · 소개: {p.inviter}</div>
                <div style={{ fontSize: 11.5, color: T.coral, marginTop: 2, fontWeight: 700 }}>쿠폰 적용: {paidPrice.toLocaleString()}원 결제</div>
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <Btn small onClick={() => onApprove(p)}>승인 · +{settings.mateReward.toLocaleString()}</Btn>
                <Btn small tone="ghost" onClick={() => setPending(pending.filter((x) => x.id !== p.id))}>보류</Btn>
              </div>
            </div>
          ))}
        </Card>
        <Card pad={18}>
          <div style={{ fontWeight: 800, fontSize: 14, marginBottom: 10 }}>이달의 앰배서더 랭킹</div>
          {inviters.length === 0 && <div style={{ fontSize: 12.5, color: T.sub }}>아직 소개 실적이 없어요.</div>}
          {inviters.map((m, i) => (
            <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: `1px solid ${T.line}` }}>
              <div style={{ width: 22, fontWeight: 800, color: i === 0 ? T.coral : T.sub, fontVariantNumeric: "tabular-nums" }}>{i + 1}</div>
              <div style={{ flex: 1, fontWeight: 700, fontSize: 14 }}>{m.name}</div>
              <Pill tone="line" style={{ fontSize: 11 }}>{m.code}</Pill>
              <Pill tone="soft">{m.invites}명</Pill>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

/* ── 시상식 (개근왕 = 최다 참가) ── */
function Awards({ members, settings }) {
  const by = (f) => [...members].sort(f)[0];
  const master = by((a, b) => b.auctions - a.auctions || b.bids - a.bids);
  const diligent = by((a, b) => b.parts - a.parts); /* 개근왕: 최다 참가 */
  const champ = by((a, b) => b.wins - a.wins);
  const ambassador = by((a, b) => b.invites - a.invites);

/* ── 공개 페이지 입장 게이트 (이름 + 전화 뒷4자리) ── */
function Gate({ members, onEnter }) {
  const [name, setName] = useState("");
  const [p4, setP4] = useState("");
  const [error, setError] = useState("");

  const tryEnter = () => {
    const n = name.trim();
    const found = members.find((m) => m.realName === n && m.phone4 === p4);
    if (found) { setError(""); onEnter(found.id); }
    else if (members.some((m) => m.realName === n)) {
      setError("전화번호 뒷 4자리가 등록 정보와 달라요. 다시 확인해주세요.");
    } else {
      setError("등록된 멤버가 아니에요. 그로인 멤버십 가입 후 운영진에게 등록을 요청해주세요.");
    }
  };

  return (
    <div style={{ minHeight: "calc(100vh - 32px)", background: T.grad, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", top: -60, right: -60, width: 280, height: 280, background: "rgba(255,255,255,.08)", borderRadius: "50%" }} />
      <div style={{ position: "absolute", bottom: -80, left: -40, width: 240, height: 240, background: "rgba(255,255,255,.06)", borderRadius: "50%" }} />

      <div style={{ width: "100%", maxWidth: 380, position: "relative" }}>
        <div style={{ textAlign: "center", color: "#fff", marginBottom: 20 }}>
          <div style={{ fontSize: 34 }}>🌱</div>
          <div style={{ fontSize: 11.5, fontWeight: 800, letterSpacing: "0.2em", opacity: 0.9, marginTop: 6 }}>해피테크 · GROW IN</div>
          <div style={{ fontSize: 24, fontWeight: 800, letterSpacing: "-0.03em", marginTop: 2 }}>그로인 크레딧</div>
          <div style={{ fontSize: 13, opacity: 0.9, marginTop: 4 }}>멤버 전용 공간입니다</div>
        </div>

        <div style={{ background: "#fff", borderRadius: 20, padding: 24, boxShadow: "0 20px 50px rgba(28,35,51,.25)" }}>
          <div style={{ fontWeight: 800, fontSize: 15, letterSpacing: "-0.01em", marginBottom: 4 }}>멤버 확인</div>
          <div style={{ fontSize: 12, color: T.sub, marginBottom: 16, lineHeight: 1.5 }}>
            단톡방 닉네임과 동일하게 <b style={{ color: T.ink }}>본명</b>과 <b style={{ color: T.ink }}>전화번호 뒷 4자리</b>를 입력하세요.
          </div>

          <div style={{ fontSize: 12, fontWeight: 800, color: T.sub, marginBottom: 4 }}>이름</div>
          <Input value={name} onChange={(e) => { setName(e.target.value); setError(""); }} placeholder="예: 홍길동"
            style={{ width: "100%", boxSizing: "border-box", marginBottom: 12 }} />

          <div style={{ fontSize: 12, fontWeight: 800, color: T.sub, marginBottom: 4 }}>전화번호 뒷 4자리</div>
          <Input value={p4} inputMode="numeric" maxLength={4}
            onChange={(e) => { setP4(e.target.value.replace(/[^0-9]/g, "").slice(0, 4)); setError(""); }}
            onKeyDown={(e) => e.key === "Enter" && name.trim() && p4.length === 4 && tryEnter()}
            placeholder="예: 1234"
            style={{ width: "100%", boxSizing: "border-box", letterSpacing: "0.3em", fontWeight: 800 }} />

          {error && (
            <div style={{ marginTop: 12, padding: "10px 12px", background: "rgba(225,95,80,.08)", border: `1px solid rgba(225,95,80,.25)`, borderRadius: 10, fontSize: 12.5, color: T.coral, fontWeight: 700, lineHeight: 1.5 }}>
              {error}
            </div>
          )}

          <div style={{ marginTop: 16 }}>
            <Btn style={{ width: "100%" }} disabled={!name.trim() || p4.length !== 4} onClick={tryEnter}>입장하기</Btn>
          </div>
          <div style={{ fontSize: 11, color: T.sub, textAlign: "center", marginTop: 12, lineHeight: 1.6 }}>
            입장이 안 되나요? 멤버 등록은 운영진이 진행합니다.<br/>단톡방에서 해피테크에게 문의해주세요.
          </div>
        </div>
      </div>
    </div>
  );
}

        {/* 시상대 */}
        <SectionTitle title="이번 주 크레딧 랭킹" right={<Pill tone="line">{members.length}명</Pill>} />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1.15fr 1fr", gap: 8, alignItems: "end", marginBottom: 14 }}>
          {[ranked[1], ranked[0], ranked[2]].map((m, idx) => {
            const rank = idx === 1 ? 1 : idx === 0 ? 2 : 3;
            const heights = [90, 108, 78];
            return (
              <div key={m.id} style={{ background: idx === 1 ? T.grad : "#fff", color: idx === 1 ? "#fff" : T.ink,
                borderRadius: 16, padding: "14px 10px", height: heights[idx],
                boxShadow: "0 6px 20px rgba(28,35,51,.08)", textAlign: "center", border: idx === 1 ? "none" : `1px solid ${T.line}`,
                display: "flex", flexDirection: "column", justifyContent: "space-between" }}>
                <div>
                  <div style={{ fontSize: 24 }}>{rank === 1 ? "🥇" : rank === 2 ? "🥈" : "🥉"}</div>
                  <div style={{ fontWeight: 800, fontSize: 13, letterSpacing: "-0.02em", marginTop: 4, lineHeight: 1.2 }}>{m.name}</div>
                </div>
                <div style={{ fontWeight: 800, fontSize: 13, fontVariantNumeric: "tabular-nums", color: idx === 1 ? "#fff" : T.coral }}>
                  {m.credits.toLocaleString()}
                </div>
              </div>
            );
          })}
        </div>

        <Card pad={0} style={{ marginBottom: 20 }}>
          {ranked.map((m, i) => {
            const lv = levelOf(m.credits, settings);
            return (
              <div key={m.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 16px", borderTop: i === 0 ? "none" : `1px solid ${T.line}`,
                background: meMember.id === m.id ? T.gradSoft : "transparent" }}>
                <div style={{ width: 22, textAlign: "center", fontWeight: 800, color: i < 3 ? T.coral : T.sub, fontVariantNumeric: "tabular-nums", fontSize: 13 }}>{i + 1}</div>
                <div style={{ fontSize: 17 }}>{lv.icon}</div>
                <div style={{ flex: 1, fontWeight: 700, fontSize: 14, letterSpacing: "-0.01em", minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {m.name}{meMember.id === m.id && <span style={{ marginLeft: 6, fontSize: 11, color: T.peri, fontWeight: 800 }}>나</span>}
                </div>
                <UseBadge credits={m.credits} settings={settings} />
                <Pill tone="soft" style={{ minWidth: 78, justifyContent: "center", fontSize: 12.5 }}>{m.credits.toLocaleString()}</Pill>
              </div>
            );
          })}
        </Card>

        {/* 인사이트 아카이브 */}
        <SectionTitle title="인사이트 아카이브" right={<Pill tone="line">{insights.length}건</Pill>} />
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12, overflowX: "auto" }}>
          {["전체", ...INSIGHT_CATS.filter((c) => insights.some((i) => i.cat === c))].map((c) => (
            <button key={c} onClick={() => setInsightFilter(c)}
              style={{ cursor: "pointer", borderRadius: 999, padding: "6px 12px", fontWeight: 700, fontSize: 12, fontFamily: "inherit", whiteSpace: "nowrap",
                background: insightFilter === c ? T.ink : "#fff", color: insightFilter === c ? "#fff" : T.sub,
                border: insightFilter === c ? "none" : `1.5px solid ${T.line}` }}>
              {c}
            </button>
          ))}
        </div>
        <div style={{ display: "grid", gap: 10, marginBottom: 20 }}>
          {insightList.length === 0 && (
            <Card pad={20} style={{ textAlign: "center", color: T.sub, fontSize: 13 }}>이 카테고리엔 아직 인사이트가 없어요.</Card>
          )}
          {insightList.map((i) => (
            <Card key={i.id} pad={16}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <Pill tone="soft" style={{ fontSize: 11.5 }}>{i.cat}</Pill>
                <div style={{ fontWeight: 800, fontSize: 14.5, letterSpacing: "-0.01em", flex: 1 }}>{i.title}</div>
                <Pill tone="line" style={{ fontSize: 11 }}>{i.date}</Pill>
              </div>
              <div style={{ fontSize: 13, color: T.ink, lineHeight: 1.7, marginTop: 8 }}>{i.body}</div>
            </Card>
          ))}
        </div>

        {/* 최근 이벤트 */}
        <SectionTitle title="최근 이벤트 하이라이트" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 10 }}>
          {log.slice(0, 3).map((e) => {
            const meta = EVENT_TYPES.find((x) => x.k === e.type) || EVENT_TYPES[EVENT_TYPES.length - 1];
            return (
              <Card key={e.id} pad={14}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 18 }}>{meta.icon}</span>
                  <div style={{ fontWeight: 800, fontSize: 14, letterSpacing: "-0.01em", flex: 1 }}>{e.title}</div>
                  <Pill tone="line" style={{ fontSize: 11 }}>{e.date}</Pill>
                </div>
                {e.note && <div style={{ fontSize: 12, color: T.sub, marginTop: 4 }}>{e.note}</div>}
                <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                  {e.winners.map((w) => {
                    const mem = members.find((x) => x.id === w.m);
                    return <Pill key={w.m} tone="coral" style={{ fontSize: 12 }}>🏅 {mem?.name} +{w.amount.toLocaleString()}</Pill>;
                  })}
                  <Pill tone="mute" style={{ fontSize: 11 }}>참가 {e.participants.length}명</Pill>
                </div>
              </Card>
            );
          })}
        </div>

        <div style={{ textAlign: "center", color: T.sub, fontSize: 11.5, marginTop: 24, lineHeight: 1.7 }}>
          해피테크 · 그로인 멤버십<br/>함께 성장하는 곳 🌱
        </div>
      </div>
    </div>
  );
}

/* ── 앱 셸 (관리자 ↔ 공개 페이지 · 인증 상태 유지) ── */
function App() {
  const [mode, setMode] = useState("admin"); // admin | public
  const [tab, setTab] = useState("board");
  const [members, setMembers] = useState(SEED_MEMBERS);
  const [ledger, setLedger] = useState(SEED_LEDGER);
  const [eventLog, setEventLog] = useState(SEED_EVENT_LOG);
  const [insights, setInsights] = useState(SEED_INSIGHTS);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [viewer, setViewer] = useState(null); // 공개 페이지 인증된 멤버 id
  const [toast, setToast] = useState(null);
  const [pending, setPending] = useState([
    { id: 1, newbie: "김서연 (신규)", code: "MATE-수현-3F7K", inviter: "고수현/1618", m: 2 },
    { id: 2, newbie: "박준호 (신규)", code: "MATE-신주-1Q9D", inviter: "박신주/8911", m: 3 },
    { id: 3, newbie: "이하늘 (신규)", code: "MATE-인홍-5W7A", inviter: "채인홍/9275", m: 1 },
  ]);

  const say = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2600); };
  const today = "07-06";

  const addCredits = (pairs) => setMembers((M) => M.map((m) => {
    const hit = pairs.filter((p) => p.m === m.id).reduce((s, p) => s + p.amount, 0);
    return hit ? { ...m, credits: m.credits + hit } : m;
  }));

  const onAdjust = (mid, amount, reason) => {
    addCredits([{ m: mid, amount }]);
    setLedger((L) => [...L, { id: nid(), m: mid, date: today, type: "수동", reason, amount }]);
    say(`크레딧 ${amount >= 0 ? "+" : ""}${amount.toLocaleString()} 기록 완료`);
  };

  const onAddMember = (realName, phone4) => {
    if (members.some((m) => m.realName === realName && m.phone4 === phone4)) {
      say("이미 등록된 멤버예요"); return;
    }
    const id = nid();
    setMembers((M) => [...M, {
      id, name: `${realName}/${phone4}`, realName, phone4, joined: today, founder: false,
      credits: 0, parts: 0, wins: 0, auctions: 0, bids: 0, invites: 0,
      code: `MATE-${realName.slice(-2)}-${String(id).slice(-2)}${phone4.slice(0, 2)}`,
    }]);
    say(`${realName}님 등록 완료 · 이제 공개 페이지 입장 가능`);
  };

  const onLogEvent = ({ type, title, note, participants, winners }) => {
    addCredits(winners.map((w) => ({ m: w.m, amount: w.amount })));
    const winSet = new Set(winners.map((w) => w.m));
    setMembers((M) => M.map((m) => {
      let np = m.parts, nw = m.wins;
      if (participants.includes(m.id)) np += 1;
      if (winSet.has(m.id)) nw += 1;
      return (np !== m.parts || nw !== m.wins) ? { ...m, parts: np, wins: nw } : m;
    }));
    setLedger((L) => [
      ...L,
      ...winners.map((w) => ({ id: nid(), m: w.m, date: today, type, reason: `${title} 당첨`, amount: w.amount })),
    ]);
    setEventLog((E) => [{ id: nid(), date: today, type, title, note, participants, winners }, ...E]);
    say(`「${title}」 참가 ${participants.length}명 · 당첨 ${winners.length}명 지급 완료`);
  };

  const onApprove = (p) => {
    addCredits([{ m: p.m, amount: settings.mateReward }]);
    setLedger((L) => [...L, { id: nid(), m: p.m, date: today, type: "메이트", reason: `메이트 소개 · ${p.newbie} 결제 확인`, amount: settings.mateReward }]);
    setMembers((M) => M.map((m) => m.id === p.m ? { ...m, invites: m.invites + 1 } : m));
    setPending((P) => P.filter((x) => x.id !== p.id));
    say(`${p.inviter}님에게 +${settings.mateReward.toLocaleString()} 크레딧 지급`);
  };

  const onAddInsight = ({ cat, title, body }) => {
    setInsights((I) => [{ id: nid(), date: today, cat, title, body }, ...I]);
    say("인사이트가 아카이브에 저장됐어요");
  };
  const onDeleteInsight = (id) => setInsights((I) => I.filter((i) => i.id !== id));

  const total = members.reduce((s, m) => s + m.credits, 0);
  const usable = members.filter((m) => canUse(m.credits, settings)).length;
  const TABS = [
    ["board", "리더보드"], ["members", "멤버 관리"], ["events", "데일리 이벤트"],
    ["mate", "그로인 메이트"], ["insights", "인사이트"], ["awards", "시상식"], ["settings", "설정"],
  ];

  const shellFont = { fontFamily: `-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Malgun Gothic",sans-serif`, WebkitFontSmoothing: "antialiased" };

  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.ink, ...shellFont }}>
      <div style={{ background: T.ink, color: "#fff", padding: "6px 12px", display: "flex", justifyContent: "center", gap: 6 }}>
        <span style={{ fontSize: 11, opacity: 0.6, alignSelf: "center", fontWeight: 700, letterSpacing: "0.08em" }}>PROTOTYPE</span>
        <button onClick={() => setMode("admin")}
          style={{ border: "none", cursor: "pointer", padding: "4px 12px", borderRadius: 999, fontSize: 11.5, fontFamily: "inherit", fontWeight: 800,
            background: mode === "admin" ? T.grad : "transparent", color: mode === "admin" ? "#fff" : "rgba(255,255,255,.6)" }}>
          🛠 관리자
        </button>
        <button onClick={() => setMode("public")}
          style={{ border: "none", cursor: "pointer", padding: "4px 12px", borderRadius: 999, fontSize: 11.5, fontFamily: "inherit", fontWeight: 800,
            background: mode === "public" ? T.grad : "transparent", color: mode === "public" ? "#fff" : "rgba(255,255,255,.6)" }}>
          👥 공개 페이지
        </button>
      </div>

      {mode === "public" ? (
        <PublicPage members={members} ledger={ledger} log={eventLog} insights={insights} settings={settings}
          viewer={viewer} onEnter={(id) => setViewer(id)} onLogout={() => setViewer(null)} />
      ) : (
        <>
          <div style={{ background: T.grad, color: "#fff", padding: "26px 22px 62px" }}>
            <div style={{ maxWidth: 980, margin: "0 auto" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
                <div>
                  <div style={{ fontSize: 11.5, fontWeight: 800, letterSpacing: "0.16em", opacity: 0.9 }}>해피테크 · GROW IN · ADMIN</div>
                  <div style={{ fontSize: 27, fontWeight: 800, letterSpacing: "-0.03em", marginTop: 2 }}>그로인 크레딧</div>
                  <div style={{ fontSize: 13, opacity: 0.9, marginTop: 3 }}>1 크레딧 = 1원 · {settings.minUse.toLocaleString()} 크레딧부터 결제 시 사용 가능</div>
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  <Pill style={{ background: "rgba(255,255,255,.18)", fontSize: 12.5 }}>멤버 {members.length}명</Pill>
                  <Pill style={{ background: "rgba(255,255,255,.18)", fontSize: 12.5 }}>사용가능 {usable}명</Pill>
                  <Pill tone="coral" style={{ fontSize: 12.5 }}>누적 {total.toLocaleString()} 크레딧</Pill>
                </div>
              </div>
            </div>
          </div>

          <div style={{ maxWidth: 980, margin: "-34px auto 0", padding: "0 16px 60px" }}>
            <div style={{ display: "flex", gap: 6, background: "#fff", borderRadius: 999, padding: 6, border: `1px solid ${T.line}`,
              boxShadow: "0 10px 30px rgba(28,35,51,.08)", overflowX: "auto", marginBottom: 20 }}>
              {TABS.map(([k, label]) => (
                <button key={k} onClick={() => setTab(k)}
                  style={{ flex: "1 0 auto", border: "none", cursor: "pointer", padding: "10px 16px", borderRadius: 999,
                    fontWeight: 800, fontSize: 13.5, letterSpacing: "-0.01em", fontFamily: "inherit", whiteSpace: "nowrap",
                    background: tab === k ? T.grad : "transparent", color: tab === k ? "#fff" : T.sub, transition: "all .15s ease" }}>
                  {label}
                </button>
              ))}
            </div>

            {tab === "board" && <Leaderboard members={members} settings={settings} />}
            {tab === "members" && <Members members={members} ledger={ledger} onAdjust={onAdjust} onAddMember={onAddMember} settings={settings} />}
            {tab === "events" && <Events members={members} log={eventLog} onLogEvent={onLogEvent} settings={settings} />}
            {tab === "mate" && <Mate members={members} onApprove={onApprove} pending={pending} setPending={setPending} settings={settings} />}
            {tab === "insights" && <Insights insights={insights} onAdd={onAddInsight} onDelete={onDeleteInsight} />}
            {tab === "awards" && <Awards members={members} settings={settings} />}
            {tab === "settings" && <Settings settings={settings} setSettings={setSettings} />}
          </div>
        </>
      )}

      {toast && (
        <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: T.ink, color: "#fff",
          padding: "12px 22px", borderRadius: 999, fontWeight: 700, fontSize: 13.5, boxShadow: "0 12px 30px rgba(28,35,51,.3)", zIndex: 50 }}>
          {toast}
        </div>
      )}
    </div>
  );
}

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
